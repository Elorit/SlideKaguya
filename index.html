<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slides Supermegafodase</title>
    <style>
      body{
        background-image: url(img/img\ \(1\).png);
        background-size: 100%;
        background-repeat: no-repeat;
        
        animation: slidefoda 60s 0s step-end infinite;
      }

      @keyframes slidefoda {
        0%{background-image: url(img/img\ \(1\).png);}
        10%{background-image: url(img/img\ \(2\).png);}
        20%{background-image: url(img/img\ \(3\).PNG);}
        30%{background-image: url(img/img\ \(4\).png);}
        40%{background-image: url(img/img\ \(5\).png);}
        50%{background-image: url(img/img\ \(6\).png);}
        60%{background-image: url(img/img\ \(7\).png);}
        70%{background-image: url(img/img\ \(8\).png);}
        80%{background-image: url(img/img\ \(10\).png);}
        90%{background-image: url(img/img\ \(11\).png);}
        100%{background-image: url(img/img\ \(12\).png);}
      }
  
    </style>
    
</head>

    
</body>
</html>
